# ==========================================
# Agentic Filming Pipeline - Global Config
# ==========================================

project:
  name: "my_video_project"
  description: "A cinematic adaptation of my novel"
  version: "1.0.0"

video:
  style: "anime"
  resolution: "1080p"
  fps: 24
  duration_per_shot: 4.0
  max_shots: 10
  aspect_ratio: "16:9"

generation:
  max_retries_per_shot: 3
  candidates_per_take: 1
  qa_threshold: 0.8
  skip_lip_sync: false
  enable_vlm_qa: true
  save_intermediates: true

# Per-agent configuration
# Each agent MUST specify its own provider and model
agents:
  lore_master:
    provider: "gemini"
    model: "gemini-3.1-flash-preview"
    api_key: "ENV:LORE_MASTER_API_KEY"
    temperature: 0.2

  screenwriter:
    provider: "gemini"
    model: "gemini-3.1-flash-preview"
    api_key: "ENV:SCREENWRITER_API_KEY"
    temperature: 0.3

  director:
    provider: "gemini"
    model: "gemini-3.1-pro-preview"
    api_key: "ENV:DIRECTOR_API_KEY"
    temperature: 0.2

  storyboarder:
    provider: "minimax"
    model: "image-01"
    api_key: "ENV:STORYBOARDER_API_KEY"

  animator:
    provider: "minimax"
    model: "MiniMax-Hailuo-02"
    api_key: "ENV:ANIMATOR_API_KEY"

  qa_linter:
    provider: "gemini"
    model: "gemini-3.1-pro-preview"
    api_key: "ENV:QA_LINTER_API_KEY"
    temperature: 0.0

  lip_sync:
    engine: "local_musetalk"
    device: "cuda:0"

  compositor:
    ffmpeg_preset: "slow"
    codec: "libx264"
    crf: 18

style_presets:
  anime:
    prompt_prefix: "High-quality 3D anime style."
    prompt_suffix: "Studio Ghibli inspired, vibrant colors, clean lines, soft lighting."

  cinematic:
    prompt_prefix: "Cinematic live-action style."
    prompt_suffix: "Dramatic lighting, film grain, 35mm aesthetic, professional color grading."

  realistic:
    prompt_prefix: "Photorealistic style."
    prompt_suffix: "Hyper-detailed, 8K resolution, realistic textures, natural lighting."

  cyberpunk:
    prompt_prefix: "Cyberpunk anime style."
    prompt_suffix: "Neon lights, rain-soaked streets, futuristic cityscape, dark atmosphere."

memory:
  type: "local"
  checkpoint_interval: 1

logging:
  level: "INFO"
  save_prompts: true
  save_api_responses: false
