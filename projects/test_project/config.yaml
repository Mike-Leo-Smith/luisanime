agents:
  animator:
    model: minimax-video
  compositor:
    codec: libx264
    crf: 18
    ffmpeg_preset: slow
  director:
    model: gemini-pro
  indexer:
    model: gemini-flash
    temperature: 0.1
  lip_sync:
    device: cuda:0
    engine: local_musetalk
  lore_master:
    model: gemini-flash
  qa_linter:
    model: gemini-pro
    temperature: 0.0
  screenwriter:
    model: gemini-flash
    temperature: 0.3
  storyboarder:
    model: minimax-image
generation:
  candidates_per_take: 1
  enable_vlm_qa: true
  max_retries_per_shot: 3
  qa_threshold: 0.8
  save_intermediates: true
  segment_selection: null
  skip_lip_sync: false
logging:
  level: INFO
  save_api_responses: false
  save_prompts: true
memory:
  checkpoint_interval: 1
  type: local
models:
  gemini-flash:
    api_key: ENV:GEMINI_FLASH_API_KEY
    max_tokens: 128000
    model: gemini-3.1-flash-lite-preview
    provider: gemini
    temperature: 0.2
  gemini-pro:
    api_key: ENV:GEMINI_PRO_API_KEY
    max_tokens: 128000
    model: gemini-3.1-pro-preview
    provider: gemini
    temperature: 0.2
  minimax-image:
    api_key: ENV:MINIMAX_IMAGE_API_KEY
    height: 1024
    model: image-01
    provider: minimax
    width: 1024
  minimax-video:
    api_key: ENV:MINIMAX_VIDEO_API_KEY
    duration: 6
    model: MiniMax-Hailuo-02
    provider: minimax
    resolution: 1080p
project:
  description: A cinematic adaptation of my novel
  name: my_video_project
  version: 1.0.0
style_presets:
  anime:
    prompt_prefix: High-quality 3D anime style.
    prompt_suffix: Studio Ghibli inspired, vibrant colors, clean lines, soft lighting.
  cinematic:
    prompt_prefix: Cinematic live-action style.
    prompt_suffix: Dramatic lighting, film grain, 35mm aesthetic, professional color
      grading.
  cyberpunk:
    prompt_prefix: Cyberpunk anime style.
    prompt_suffix: Neon lights, rain-soaked streets, futuristic cityscape, dark atmosphere.
  realistic:
    prompt_prefix: Photorealistic style.
    prompt_suffix: Hyper-detailed, 8K resolution, realistic textures, natural lighting.
video:
  fps: 24
  max_shots: 10
  resolution: 1080p
  style: anime
