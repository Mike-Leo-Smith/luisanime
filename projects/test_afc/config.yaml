project:
  name: my_video_project
  description: A cinematic adaptation of my novel
  version: 1.0.0
video:
  style: anime
  resolution: 1080p
  fps: 24
  aspect_ratio: '16:9'
  max_shots: 10
generation:
  project_budget_usd: 100.0
  max_retries_per_shot: 3
  enable_vlm_qa: true
  segment_selection:
    chapters: []
models:
  gemini-flash:
    provider: gemini
    model: gemini-3.1-flash-lite-preview
    api_key: ENV:GEMINI_FLASH_API_KEY
    temperature: 0.2
  gemini-pro:
    provider: gemini
    model: gemini-3.1-pro-preview
    api_key: ENV:GEMINI_PRO_API_KEY
    temperature: 0.2
  gemini-image:
    provider: gemini
    model: nano-banana-pro-preview
    api_key: ENV:GEMINI_FLASH_API_KEY
  minimax-video:
    provider: minimax
    model: MiniMax-Hailuo-2.3
    api_key: ENV:MINIMAX_VIDEO_API_KEY
agents:
  showrunner:
    llm: gemini-flash
  screenwriter:
    llm: gemini-flash
  production_designer:
    llm: gemini-flash
    image: gemini-image
  director:
    llm: gemini-flash
  script_coordinator:
    llm: gemini-flash
  previs_artist:
    llm: gemini-flash
    video: minimax-video
    resolution: 360p
    fps: 8
  cinematographer:
    llm: gemini-flash
    image: gemini-image
  lead_animator:
    llm: gemini-flash
    video: minimax-video
  continuity_supervisor:
    llm: gemini-pro
  editor:
    llm: gemini-flash
style_presets:
  anime:
    prompt_prefix: Studio Ghibli 2D manga style, hand-drawn aesthetic, high-quality
      traditional animation.
    prompt_suffix: Vibrant but natural colors, lush painterly backgrounds, soft cinematic
      lighting, clean line art, nostalgic atmosphere, whimsical details, Joe Hisaishi
      movie vibe, 2D cell shaded.
  cinematic:
    prompt_prefix: Cinematic 35mm film style, photorealistic, highly detailed.
    prompt_suffix: Dramatic lighting, deep shadows, rich textures, professional color
      grading, anamorphic lens flares, slight film grain, epic composition.
